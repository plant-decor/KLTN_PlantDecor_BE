

services:
  api:
    build:
      context: .
      dockerfile: PlantDecor.API/Dockerfile
    container_name: plant-api

    ports:
      - "5000:8080"


    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Redis=redis:6379,abortConnect=false

    depends_on: 
      redis:
        condition: service_healthy

    restart: always

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

    networks:
      - app-network

  redis:
    image: redis:7
    container_name: plant-redis
    command: redis-server --save 60 1
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app-network

networks:
  app-network: